<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Renó Soluções Contábeis</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-card-wrapper w-100" style="max-width: 400px;">
            
            <div class="card border-0 shadow-lg login-card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold logo-login">RENÓ <span class="text-gold">CONTABILIDADE</span></h2>
                    <p class="text-muted small">Área do Cliente - Acesso Restrito</p>
                </div>

                <form>
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                        <input type="email" class="form-control custom-input border-start-0" placeholder="E-mail ou CPF" required>
                    </div>

                    <div class="input-group mb-4">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control custom-input border-start-0" placeholder="Sua senha" required>
                    </div>

                    <button type="submit" class="btn w-100 custom-btn-gold py-2 mb-3">ENTRAR NO SISTEMA</button>

                    <div class="text-center">
                        <a href="#" class="text-decoration-none small text-gold">Esqueceu a senha? Falar com suporte</a>
                    </div>
                </form>
            </div>

            <div class="text-center mt-4">
                <a href="index.html" class="text-white-50 text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Voltar para o site
                </a>
            </div>
        </div>
    </div>

</body>
</html>
